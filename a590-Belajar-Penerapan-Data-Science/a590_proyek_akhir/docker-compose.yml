version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: metabase-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: student_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - metabase_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d student_data"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      MB_JAVA_OPTS: "-Xmx4g"
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase_app
      MB_DB_PORT: 5432
      MB_DB_USER: admin
      MB_DB_PASS: password
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metabase_network
    restart: always

volumes:
  postgres_data:
    driver: local

networks:
  metabase_network:
    driver: bridge
